name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Debug

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}
      
    - name: Build lib
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /t:DragonShouryo
      
    - name: Zip Debug
      # You may pin to the exact commit or the version.
      # uses: TheDoctor0/zip-release@a24011d8d445e4da5935a7e73c1f98e22a439464
      uses: TheDoctor0/zip-release@0.7.1
      with:
        # Filename for archive
        filename: DSRPlayer-debug-win64.zip
        # Base path for archive files
        path: ${{env.GITHUB_WORKSPACE}}/DSRPlayer/Debug/
      
    - name: Zip Release
      # You may pin to the exact commit or the version.
      # uses: TheDoctor0/zip-release@a24011d8d445e4da5935a7e73c1f98e22a439464
      uses: TheDoctor0/zip-release@0.7.1
      with:
        # Filename for archive
        filename: DSRPlayer-release-win64.zip
        # Base path for archive files
        path: ${{env.GITHUB_WORKSPACE}}/DSRPlayer/Release/
        
    - name: Build all
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
      
    - name: Upload debug artifact
      uses: actions/upload-artifact@v3.1.2
      with:
        # Artifact name
        name: Win64-debug
        # A file, directory or wildcard pattern that describes what to upload
        path: DSRPlayer-debug-win64.tar.gz
        
    - name: Upload release artifact
      uses: actions/upload-artifact@v3.1.2
      with:
        # Artifact name
        name: Win64-Release
        # A file, directory or wildcard pattern that describes what to upload
        path: DSRPlayer-release-win64.tar.gz
